<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>
    <h3>Student Registration Form</h3>
    The student is confirmed
    First name : <span th:text="${student.firstName}"></span><br>
    Last name : <span th:text="${student.lastName}"></span><br>
    Email : <span th:text="${student.email}"></span><br>
    Country : <span th:text="${student.country}"></span><br>
    Current Devices :
    <ul>
        <li th:each="device : ${student.currentDevices}" th:text="${device}"></li>
    </ul>
    <br>
    Favorite Language : <span th:text="${student.favoriteLanguage}"></span>


</body>
</html>
